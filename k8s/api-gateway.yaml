---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_ID
              value: "user-service"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: "http://user-service:8081"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0
              value: "Path=/users/**"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_ID
              value: "flight-service"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_URI
              value: "http://flight-service:8082"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0
              value: "Path=/flights/**"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_ID
              value: "booking-service"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_URI
              value: "http://booking-service:8083"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0
              value: "Path=/bookings/**"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_ID
              value: "payment-service"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_URI
              value: "http://payment-service:8084"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0
              value: "Path=/payments/**"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
